# Custom zsh-patina theme extending classic
# classic.toml is shipped alongside this file in the zshkit repo.
# The PATINA_CONFIG_DIR placeholder is replaced by setup_zsh.sh at install time.

# ── Arguments ─────────────────────────────────────────────────────────
# Plain arguments (subcommands like `apt-get`, values, positional args)
"meta.function-call.arguments" = "white"

# ── Control flow ──────────────────────────────────────────────────────
# classic has keyword.control = yellow; bold makes it stand out from
# operators (&&/||) which are plain blue
"keyword.control" = { foreground = "yellow", bold = true }

# ── Operators ─────────────────────────────────────────────────────────
# && / || — bold blue
"keyword.operator.logical.and" = { foreground = "blue", bold = true }
"keyword.operator.logical.or"  = { foreground = "blue", bold = true }

# | pipe — bold magenta (distinct data-flow signal vs &&)
"keyword.operator.logical.pipe" = { foreground = "magenta", bold = true }

# ; — flat blue, lower visual weight than &&
"keyword.operator.logical.continue" = "blue"

# = in --flag=value
"keyword.operator.assignment.option" = "magenta"

# Redirections (>, >>, <, 2>)
"keyword.operator.assignment.redirection" = { foreground = "magenta", bold = true }

# ── Line continuation \ ────────────────────────────────────────────────
"punctuation.separator.continuation.line" = { foreground = "yellow", bold = true }

# ── Dynamic callable types ─────────────────────────────────────────────
# External command (valid)  — underlined green
"dynamic.callable.command"  = { foreground = "green", underline = true }
# Shell builtin (cd, echo…) — cyan (same hue as parameters, distinct role)
"dynamic.callable.builtin"  = "cyan"
# User-defined function     — bold green
"dynamic.callable.function" = { foreground = "green", bold = true }
# Alias                     — italic green
"dynamic.callable.alias"    = { foreground = "green", italic = true }

# ── Test brackets [[ ]] ────────────────────────────────────────────────
"support.function.double-brace" = "cyan"

[metadata]
extends = "file:PATINA_CONFIG_DIR/classic.toml"
